<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神经进化大冒险 - AI原理可视化游戏</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #050510;
            color: #e0e0ff;
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        /* 动态背景网格 */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }
        
        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }
        
        /* 粒子背景 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(0, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 15s infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        
        /* 主容器 */
        #gameContainer {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 10;
        }
        
        /* 左侧控制面板 - 玻璃拟态效果 */
        .control-panel {
            width: 320px;
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(0, 255, 255, 0.2);
            padding: 25px;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.1);
        }
        
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8em;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 0.85em;
            color: #6688aa;
            margin-bottom: 25px;
            font-weight: 300;
        }
        
        /* 神经网络可视化 */
        .nn-visualizer {
            background: rgba(0, 20, 40, 0.6);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .nn-visualizer::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffff);
            border-radius: 14px;
            opacity: 0;
            z-index: -1;
            transition: opacity 0.3s;
        }
        
        .nn-visualizer:hover::before {
            opacity: 0.3;
            animation: borderRotate 3s linear infinite;
        }
        
        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        
        .nn-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9em;
            color: #00ffff;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nn-title::before {
            content: '◉';
            color: #ff00ff;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        
        #neuralCanvas {
            width: 100%;
            height: 200px;
            background: radial-gradient(circle at center, rgba(0, 255, 255, 0.05) 0%, transparent 70%);
        }
        
        /* 控制组 */
        .control-group {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }
        
        .control-group:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(0, 255, 255, 0.2);
            transform: translateX(5px);
        }
        
        .control-label {
            display: block;
            font-size: 0.85em;
            color: #88aaff;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            background: linear-gradient(90deg, #001133, #00ffff);
            border-radius: 3px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #00ffff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            transition: transform 0.2s;
        }
        
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        
        .value-display {
            font-family: 'Orbitron', monospace;
            color: #00ffff;
            font-size: 0.9em;
            min-width: 40px;
            text-align: right;
        }
        
        /* 按钮样式 */
        .btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: none;
            border-radius: 8px;
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00ffff 0%, #0088ff 100%);
            color: #000;
            box-shadow: 0 4px 20px rgba(0, 255, 255, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 255, 255, 0.5);
        }
        
        .btn-secondary {
            background: transparent;
            border: 2px solid #ff00ff;
            color: #ff00ff;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }
        
        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
            opacity: 0;
        }
        
        .btn:hover::after {
            animation: shine 0.5s ease-in-out;
        }
        
        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); opacity: 0; }
        }
        
        /* 统计信息 */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        
        .stat-box {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5em;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        
        .stat-label {
            font-size: 0.75em;
            color: #6688aa;
            margin-top: 4px;
        }
        
        /* 游戏画布区域 */
        .game-area {
            flex: 1;
            position: relative;
            background: radial-gradient(ellipse at center, #0a0a20 0%, #000000 100%);
        }
        
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* 浮动信息面板 */
        .info-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 15, 30, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            max-width: 300px;
            transform: translateX(350px);
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        .info-overlay.active {
            transform: translateX(0);
        }
        
        .info-title {
            color: #ff00ff;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        
        .info-text {
            font-size: 0.9em;
            line-height: 1.6;
            color: #aaccff;
        }
        
        /* 代际指示器 */
        .generation-indicator {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffff;
            border-radius: 30px;
            padding: 10px 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2em;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            #gameContainer {
                flex-direction: column;
            }
            .control-panel {
                width: 100%;
                height: 40vh;
                border-right: none;
                border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            }
        }
        
        /* 加载动画 */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        
        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid transparent;
            border-top-color: #00ffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: relative;
        }
        
        .loader::before, .loader::after {
            content: '';
            position: absolute;
            border: 3px solid transparent;
            border-radius: 50%;
        }
        
        .loader::before {
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border-top-color: #ff00ff;
            animation: spin 2s linear infinite reverse;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 加载画面 -->
    <div class="loading" id="loading">
        <div class="loader"></div>
    </div>
    
    <!-- 背景效果 -->
    <div class="bg-grid"></div>
    <div class="particles" id="particles"></div>
    
    <div id="gameContainer">
        <!-- 控制面板 -->
        <div class="control-panel">
            <h1>NEURO-EVO</h1>
            <div class="subtitle">神经进化模拟器 v1.0</div>
            
            <!-- 神经网络可视化 -->
            <div class="nn-visualizer">
                <div class="nn-title">神经网络拓扑</div>
                <canvas id="neuralCanvas"></canvas>
            </div>
            
            <!-- 控制参数 -->
            <div class="control-group">
                <label class="control-label">种群数量 (Population)</label>
                <div class="slider-container">
                    <input type="range" id="popSize" min="10" max="100" value="50">
                    <span class="value-display" id="popValue">50</span>
                </div>
            </div>
            
            <div class="control-group">
                <label class="control-label">变异率 (Mutation Rate)</label>
                <div class="slider-container">
                    <input type="range" id="mutRate" min="1" max="50" value="10">
                    <span class="value-display" id="mutValue">0.1</span>
                </div>
            </div>
            
            <div class="control-group">
                <label class="control-label">选择压力 (Selection Pressure)</label>
                <div class="slider-container">
                    <input type="range" id="selPressure" min="1" max="10" value="5">
                    <span class="value-display" id="selValue">0.5</span>
                </div>
            </div>
            
            <div class="control-group">
                <label class="control-label">网络复杂度 (Hidden Nodes)</label>
                <div class="slider-container">
                    <input type="range" id="hiddenNodes" min="2" max="16" value="6">
                    <span class="value-display" id="hiddenValue">6</span>
                </div>
            </div>
            
            <!-- 操作按钮 -->
            <button class="btn btn-primary" onclick="game.start()">▶ 开始进化</button>
            <button class="btn btn-secondary" onclick="game.reset()">↻ 重置种群</button>
            
            <!-- 统计信息 -->
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-value" id="genCount">0</div>
                    <div class="stat-label">当前代际</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="bestFitness">0</div>
                    <div class="stat-label">最佳适应度</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="avgFitness">0</div>
                    <div class="stat-label">平均适应度</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="aliveCount">0</div>
                    <div class="stat-label">存活个体</div>
                </div>
            </div>
        </div>
        
        <!-- 游戏区域 -->
        <div class="game-area">
            <div class="generation-indicator">第 <span id="genDisplay">0</span> 代</div>
            <canvas id="gameCanvas"></canvas>
            
            <!-- 信息浮层 -->
            <div class="info-overlay" id="infoOverlay">
                <div class="info-title">AI 决策原理</div>
                <div class="info-text" id="infoText">
                    每个智能体使用前馈神经网络进行决策。输入层接收环境传感器数据（障碍物距离、速度等），隐藏层进行特征提取，输出层控制运动方向。
                </div>
            </div>
        </div>
    </div>

    <script>
        // 粒子背景生成
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // 神经网络类 - 实现前馈网络
        class NeuralNetwork {
            constructor(inputNodes, hiddenNodes, outputNodes) {
                this.inputNodes = inputNodes;
                this.hiddenNodes = hiddenNodes;
                this.outputNodes = outputNodes;
                
                // 初始化权重矩阵
                this.weights_ih = new Matrix(hiddenNodes, inputNodes);
                this.weights_ho = new Matrix(outputNodes, hiddenNodes);
                this.weights_ih.randomize();
                this.weights_ho.randomize();
                
                // 偏置
                this.bias_h = new Matrix(hiddenNodes, 1);
                this.bias_o = new Matrix(outputNodes, 1);
                this.bias_h.randomize();
                this.bias_o.randomize();
            }
            
            // 前向传播
            predict(inputs) {
                // 输入层到隐藏层
                let hidden = Matrix.multiply(this.weights_ih, inputs);
                hidden.add(this.bias_h);
                hidden.map(sigmoid);
                
                // 隐藏层到输出层
                let outputs = Matrix.multiply(this.weights_ho, hidden);
                outputs.add(this.bias_o);
                outputs.map(sigmoid);
                
                return outputs;
            }
            
            // 遗传算法：交叉
            crossover(partner) {
                let child = new NeuralNetwork(this.inputNodes, this.hiddenNodes, this.outputNodes);
                
                // 交叉隐藏层权重
                for (let i = 0; i < this.weights_ih.rows; i++) {
                    for (let j = 0; j < this.weights_ih.cols; j++) {
                        child.weights_ih.data[i][j] = Math.random() < 0.5 ? 
                            this.weights_ih.data[i][j] : partner.weights_ih.data[i][j];
                    }
                }
                
                // 交叉输出层权重
                for (let i = 0; i < this.weights_ho.rows; i++) {
                    for (let j = 0; j < this.weights_ho.cols; j++) {
                        child.weights_ho.data[i][j] = Math.random() < 0.5 ? 
                            this.weights_ho.data[i][j] : partner.weights_ho.data[i][j];
                    }
                }
                
                return child;
            }
            
            // 变异
            mutate(rate) {
                this.weights_ih.map(x => Math.random() < rate ? x + randomGaussian() * 0.5 : x);
                this.weights_ho.map(x => Math.random() < rate ? x + randomGaussian() * 0.5 : x);
                this.bias_h.map(x => Math.random() < rate ? x + randomGaussian() * 0.5 : x);
                this.bias_o.map(x => Math.random() < rate ? x + randomGaussian() * 0.5 : x);
            }
            
            // 复制
            copy() {
                let clone = new NeuralNetwork(this.inputNodes, this.hiddenNodes, this.outputNodes);
                clone.weights_ih = this.weights_ih.copy();
                clone.weights_ho = this.weights_ho.copy();
                clone.bias_h = this.bias_h.copy();
                clone.bias_o = this.bias_o.copy();
                return clone;
            }
        }

        // 矩阵运算类
        class Matrix {
            constructor(rows, cols) {
                this.rows = rows;
                this.cols = cols;
                this.data = Array(rows).fill().map(() => Array(cols).fill(0));
            }
            
            randomize() {
                this.map(x => Math.random() * 2 - 1);
            }
            
            copy() {
                let m = new Matrix(this.rows, this.cols);
                for (let i = 0; i < this.rows; i++) {
                    for (let j = 0; j < this.cols; j++) {
                        m.data[i][j] = this.data[i][j];
                    }
                }
                return m;
            }
            
            static multiply(a, b) {
                if (a.cols !== b.rows) return null;
                let result = new Matrix(a.rows, b.cols);
                for (let i = 0; i < a.rows; i++) {
                    for (let j = 0; j < b.cols; j++) {
                        let sum = 0;
                        for (let k = 0; k < a.cols; k++) {
                            sum += a.data[i][k] * b.data[k][j];
                        }
                        result.data[i][j] = sum;
                    }
                }
                return result;
            }
            
            add(m) {
                if (m instanceof Matrix) {
                    for (let i = 0; i < this.rows; i++) {
                        for (let j = 0; j < this.cols; j++) {
                            this.data[i][j] += m.data[i][j];
                        }
                    }
                }
            }
            
            map(func) {
                for (let i = 0; i < this.rows; i++) {
                    for (let j = 0; j < this.cols; j++) {
                        this.data[i][j] = func(this.data[i][j]);
                    }
                }
            }
        }

        function sigmoid(x) {
            return 1 / (1 + Math.exp(-x));
        }

        function randomGaussian() {
            let u = 0, v = 0;
            while(u === 0) u = Math.random();
            while(v === 0) v = Math.random();
            return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        }

        // 智能体类
        class Agent {
            constructor(x, y, brain = null) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.radius = 6;
                this.alive = true;
                this.fitness = 0;
                this.timeAlive = 0;
                this.distanceTraveled = 0;
                this.heading = Math.random() * Math.PI * 2;
                
                // 传感器
                this.sensors = [];
                for (let i = -0.5; i <= 0.5; i += 0.25) {
                    this.sensors.push({ angle: i, distance: 0 });
                }
                
                // 大脑
                if (brain) {
                    this.brain = brain.copy();
                } else {
                    this.brain = new NeuralNetwork(5, parseInt(document.getElementById('hiddenNodes').value), 2);
                }
                
                // 视觉轨迹
                this.trail = [];
                this.maxTrailLength = 20;
            }
            
            update(obstacles, target) {
                if (!this.alive) return;
                
                // 更新传感器
                this.updateSensors(obstacles);
                
                // 准备神经网络输入
                let inputs = new Matrix(5, 1);
                inputs.data[0][0] = this.sensors[0].distance / 100; // 左传感器
                inputs.data[1][0] = this.sensors[1].distance / 100; // 中左
                inputs.data[2][0] = this.sensors[2].distance / 100; // 中传感器
                inputs.data[3][0] = this.sensors[3].distance / 100; // 中右
                inputs.data[4][0] = this.sensors[4].distance / 100; // 右传感器
                
                // 获取决策
                let outputs = this.brain.predict(inputs);
                
                // 解释输出：转向和速度
                let turn = (outputs.data[0][0] - 0.5) * 2; // -1 到 1
                let speed = outputs.data[1][0]; // 0 到 1
                
                // 应用物理
                this.heading += turn * 0.3;
                this.vx = Math.cos(this.heading) * speed * 3;
                this.vy = Math.sin(this.heading) * speed * 3;
                
                // 更新位置
                let prevX = this.x;
                let prevY = this.y;
                this.x += this.vx;
                this.y += this.vy;
                
                // 边界检查
                if (this.x < 0 || this.x > game.width || this.y < 0 || this.y > game.height) {
                    this.alive = false;
                }
                
                // 障碍物碰撞
                for (let obs of obstacles) {
                    let dx = this.x - obs.x;
                    let dy = this.y - obs.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < this.radius + obs.radius) {
                        this.alive = false;
                    }
                }
                
                // 更新轨迹
                if (this.timeAlive % 3 === 0) {
                    this.trail.push({x: this.x, y: this.y});
                    if (this.trail.length > this.maxTrailLength) {
                        this.trail.shift();
                    }
                }
                
                // 计算适应度
                this.timeAlive++;
                let distToTarget = Math.sqrt((this.x - target.x) ** 2 + (this.y - target.y) ** 2);
                this.fitness = this.timeAlive + (1000 / (distToTarget + 1));
            }
            
            updateSensors(obstacles) {
                for (let i = 0; i < this.sensors.length; i++) {
                    let sensorAngle = this.heading + this.sensors[i].angle;
                    let minDist = 100;
                    
                    // 检查障碍物
                    for (let obs of obstacles) {
                        let dist = this.raycast(this.x, this.y, sensorAngle, obs);
                        if (dist < minDist) minDist = dist;
                    }
                    
                    // 检查边界
                    let boundaryDist = this.raycastBoundary(this.x, this.y, sensorAngle);
                    if (boundaryDist < minDist) minDist = boundaryDist;
                    
                    this.sensors[i].distance = minDist;
                }
            }
            
            raycast(x, y, angle, obs) {
                // 简化的圆形相交测试
                let dx = Math.cos(angle);
                let dy = Math.sin(angle);
                let fx = obs.x - x;
                let fy = obs.y - y;
                
                let a = dx * dx + dy * dy;
                let b = -2 * (dx * fx + dy * fy);
                let c = fx * fx + fy * fy - obs.radius * obs.radius;
                
                let discriminant = b * b - 4 * a * c;
                if (discriminant < 0) return 100;
                
                let t = (-b - Math.sqrt(discriminant)) / (2 * a);
                if (t > 0 && t < 100) return t;
                return 100;
            }
            
            raycastBoundary(x, y, angle) {
                let dx = Math.cos(angle);
                let dy = Math.sin(angle);
                let dist = 100;
                
                if (dx > 0) dist = Math.min(dist, (game.width - x) / dx);
                if (dx < 0) dist = Math.min(dist, -x / dx);
                if (dy > 0) dist = Math.min(dist, (game.height - y) / dy);
                if (dy < 0) dist = Math.min(dist, -y / dy);
                
                return Math.abs(dist);
            }
            
            draw(ctx) {
                // 绘制轨迹
                ctx.strokeStyle = 'rgba(0, 255, 255, 0.2)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let i = 0; i < this.trail.length; i++) {
                    if (i === 0) ctx.moveTo(this.trail[i].x, this.trail[i].y);
                    else ctx.lineTo(this.trail[i].x, this.trail[i].y);
                }
                ctx.stroke();
                
                // 绘制传感器
                ctx.strokeStyle = 'rgba(255, 0, 255, 0.3)';
                ctx.lineWidth = 1;
                for (let sensor of this.sensors) {
                    let angle = this.heading + sensor.angle;
                    let endX = this.x + Math.cos(angle) * sensor.distance;
                    let endY = this.y + Math.sin(angle) * sensor.distance;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                }
                
                // 绘制智能体
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.heading);
                
                // 发光效果
                let gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius * 2);
                gradient.addColorStop(0, 'rgba(0, 255, 255, 1)');
                gradient.addColorStop(0.5, 'rgba(0, 255, 255, 0.3)');
                gradient.addColorStop(1, 'rgba(0, 255, 255, 0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 2, 0, Math.PI * 2);
                ctx.fill();
                
                // 主体
                ctx.fillStyle = this.alive ? '#00ffff' : '#ff0044';
                ctx.beginPath();
                ctx.moveTo(this.radius * 1.5, 0);
                ctx.lineTo(-this.radius, -this.radius);
                ctx.lineTo(-this.radius, this.radius);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            }
        }

        // 游戏主类
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.nnCanvas = document.getElementById('neuralCanvas');
                this.nnCtx = this.nnCanvas.getContext('2d');
                
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                this.agents = [];
                this.obstacles = [];
                this.target = { x: this.width - 100, y: this.height / 2 };
                this.generation = 0;
                this.running = false;
                this.mutationRate = 0.1;
                this.populationSize = 50;
                this.selectionPressure = 0.5;
                
                this.initObstacles();
                this.setupUI();
                
                // 隐藏加载画面
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                }, 1000);
            }
            
            resize() {
                this.width = this.canvas.parentElement.clientWidth;
                this.height = this.canvas.parentElement.clientHeight;
                this.canvas.width = this.width;
                this.canvas.height = this.height;
                this.target = { x: this.width - 100, y: this.height / 2 };
            }
            
            initObstacles() {
                this.obstacles = [];
                // 生成随机障碍物
                for (let i = 0; i < 8; i++) {
                    this.obstacles.push({
                        x: 200 + Math.random() * (this.width - 400),
                        y: Math.random() * this.height,
                        radius: 30 + Math.random() * 40
                    });
                }
            }
            
            setupUI() {
                // 滑块事件
                document.getElementById('popSize').addEventListener('input', (e) => {
                    this.populationSize = parseInt(e.target.value);
                    document.getElementById('popValue').textContent = this.populationSize;
                });
                
                document.getElementById('mutRate').addEventListener('input', (e) => {
                    this.mutationRate = parseInt(e.target.value) / 100;
                    document.getElementById('mutValue').textContent = this.mutationRate.toFixed(2);
                });
                
                document.getElementById('selPressure').addEventListener('input', (e) => {
                    this.selectionPressure = parseInt(e.target.value) / 10;
                    document.getElementById('selValue').textContent = this.selectionPressure.toFixed(1);
                });
                
                document.getElementById('hiddenNodes').addEventListener('input', (e) => {
                    document.getElementById('hiddenValue').textContent = e.target.value;
                });
                
                // 信息面板交互
                this.canvas.addEventListener('click', () => {
                    document.getElementById('infoOverlay').classList.toggle('active');
                });
            }
            
            reset() {
                this.agents = [];
                this.generation = 0;
                this.running = false;
                this.initObstacles();
                this.updateStats();
            }
            
            start() {
                if (this.agents.length === 0) {
                    this.createInitialPopulation();
                }
                this.running = true;
                this.loop();
            }
            
            createInitialPopulation() {
                this.agents = [];
                for (let i = 0; i < this.populationSize; i++) {
                    this.agents.push(new Agent(50, this.height / 2 + (Math.random() - 0.5) * 200));
                }
            }
            
            evolve() {
                // 计算适应度并排序
                this.agents.sort((a, b) => b.fitness - a.fitness);
                
                // 选择精英
                let eliteCount = Math.max(2, Math.floor(this.populationSize * this.selectionPressure));
                let newAgents = [];
                
                // 保留精英
                for (let i = 0; i < Math.min(2, eliteCount); i++) {
                    let elite = new Agent(50, this.height / 2, this.agents[i].brain);
                    newAgents.push(elite);
                }
                
                // 生成下一代
                while (newAgents.length < this.populationSize) {
                    // 锦标赛选择
                    let parent1 = this.tournamentSelect(eliteCount);
                    let parent2 = this.tournamentSelect(eliteCount);
                    
                    // 交叉和变异
                    let childBrain = parent1.brain.crossover(parent2.brain);
                    childBrain.mutate(this.mutationRate);
                    
                    newAgents.push(new Agent(50, this.height / 2, childBrain));
                }
                
                this.agents = newAgents;
                this.generation++;
                this.initObstacles(); // 新环境
            }
            
            tournamentSelect(poolSize) {
                let best = this.agents[Math.floor(Math.random() * poolSize)];
                for (let i = 0; i < 2; i++) {
                    let contender = this.agents[Math.floor(Math.random() * poolSize)];
                    if (contender.fitness > best.fitness) best = contender;
                }
                return best;
            }
            
            update() {
                let aliveCount = 0;
                let totalFitness = 0;
                let bestFitness = 0;
                
                for (let agent of this.agents) {
                    if (agent.alive) {
                        agent.update(this.obstacles, this.target);
                        aliveCount++;
                        totalFitness += agent.fitness;
                        if (agent.fitness > bestFitness) bestFitness = agent.fitness;
                    }
                }
                
                // 检查是否全部死亡或到达目标
                if (aliveCount === 0 || this.agents.some(a => {
                    let d = Math.sqrt((a.x - this.target.x)**2 + (a.y - this.target.y)**2);
                    return d < 30;
                })) {
                    this.evolve();
                }
                
                // 更新统计
                document.getElementById('aliveCount').textContent = aliveCount;
                document.getElementById('bestFitness').textContent = Math.floor(bestFitness);
                document.getElementById('avgFitness').textContent = Math.floor(totalFitness / this.agents.length);
                document.getElementById('genCount').textContent = this.generation;
                document.getElementById('genDisplay').textContent = this.generation;
            }
            
            draw() {
                // 清空画布
                this.ctx.fillStyle = 'rgba(5, 5, 16, 0.3)';
                this.ctx.fillRect(0, 0, this.width, this.height);
                
                // 绘制目标
                let pulse = Math.sin(Date.now() / 200) * 5;
                let gradient = this.ctx.createRadialGradient(
                    this.target.x, this.target.y, 0,
                    this.target.x, this.target.y, 40 + pulse
                );
                gradient.addColorStop(0, 'rgba(255, 0, 255, 0.8)');
                gradient.addColorStop(0.5, 'rgba(255, 0, 255, 0.3)');
                gradient.addColorStop(1, 'rgba(255, 0, 255, 0)');
                this.ctx.fillStyle = gradient;
                this.ctx.beginPath();
                this.ctx.arc(this.target.x, this.target.y, 40 + pulse, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.fillStyle = '#ff00ff';
                this.ctx.beginPath();
                this.ctx.arc(this.target.x, this.target.y, 8, 0, Math.PI * 2);
                this.ctx.fill();
                
                // 绘制障碍物
                for (let obs of this.obstacles) {
                    let grad = this.ctx.createRadialGradient(
                        obs.x, obs.y, 0,
                        obs.x, obs.y, obs.radius
                    );
                    grad.addColorStop(0, 'rgba(255, 50, 50, 0.8)');
                    grad.addColorStop(0.7, 'rgba(255, 0, 0, 0.4)');
                    grad.addColorStop(1, 'rgba(255, 0, 0, 0.1)');
                    this.ctx.fillStyle = grad;
                    this.ctx.beginPath();
                    this.ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    // 警告环
                    this.ctx.strokeStyle = 'rgba(255, 0, 0, 0.3)';
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.arc(obs.x, obs.y, obs.radius + 5, 0, Math.PI * 2);
                    this.ctx.stroke();
                }
                
                // 绘制智能体
                for (let agent of this.agents) {
                    agent.draw(this.ctx);
                }
                
                // 绘制神经网络可视化
                this.drawNeuralNetwork();
            }
            
            drawNeuralNetwork() {
                let ctx = this.nnCtx;
                let w = this.nnCanvas.width = this.nnCanvas.offsetWidth;
                let h = this.nnCanvas.height = this.nnCanvas.offsetHeight;
                
                ctx.clearRect(0, 0, w, h);
                
                // 获取最佳智能体的大脑结构
                let bestAgent = this.agents.reduce((best, a) => a.fitness > best.fitness ? a : best, this.agents[0]);
                if (!bestAgent) return;
                
                let layers = [5, parseInt(document.getElementById('hiddenNodes').value), 2];
                let layerX = [w * 0.2, w * 0.5, w * 0.8];
                let nodeY = [];
                
                // 计算节点位置
                for (let i = 0; i < layers.length; i++) {
                    let y = [];
                    let spacing = h / (layers[i] + 1);
                    for (let j = 0; j < layers[i]; j++) {
                        y.push(spacing * (j + 1));
                    }
                    nodeY.push(y);
                }
                
                // 绘制连接
                ctx.strokeStyle = 'rgba(0, 255, 255, 0.2)';
                ctx.lineWidth = 1;
                for (let i = 0; i < layers.length - 1; i++) {
                    for (let j = 0; j < layers[i]; j++) {
                        for (let k = 0; k < layers[i + 1]; k++) {
                            ctx.beginPath();
                            ctx.moveTo(layerX[i], nodeY[i][j]);
                            ctx.lineTo(layerX[i + 1], nodeY[i + 1][k]);
                            ctx.stroke();
                        }
                    }
                }
                
                // 绘制节点
                for (let i = 0; i < layers.length; i++) {
                    for (let j = 0; j < layers[i]; j++) {
                        let x = layerX[i];
                        let y = nodeY[i][j];
                        
                        // 节点发光
                        let gradient = ctx.createRadialGradient(x, y, 0, x, y, 15);
                        gradient.addColorStop(0, i === 0 ? '#00ffff' : i === layers.length - 1 ? '#ff00ff' : '#ffff00');
                        gradient.addColorStop(1, 'transparent');
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(x, y, 15, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // 节点核心
                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.arc(x, y, 5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                
                // 标签
                ctx.fillStyle = '#6688aa';
                ctx.font = '10px Orbitron';
                ctx.textAlign = 'center';
                ctx.fillText('INPUT', w * 0.2, h - 10);
                ctx.fillText('HIDDEN', w * 0.5, h - 10);
                ctx.fillText('OUTPUT', w * 0.8, h - 10);
            }
            
            loop() {
                if (!this.running) return;
                
                this.update();
                this.draw();
                
                requestAnimationFrame(() => this.loop());
            }
            
            updateStats() {
                document.getElementById('genCount').textContent = this.generation;
                document.getElementById('genDisplay').textContent = this.generation;
                document.getElementById('bestFitness').textContent = '0';
                document.getElementById('avgFitness').textContent = '0';
                document.getElementById('aliveCount').textContent = '0';
            }
        }

        // 启动游戏
        let game = new Game();
    </script>
</body>
